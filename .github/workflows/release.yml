name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .deb package
        run: |
          chmod +x packaging/linux/build_deb.sh
          bash packaging/linux/build_deb.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/deb/*.deb
          if-no-files-found: error

  build-windows:
    name: Build Windows Setup
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        shell: powershell
        run: |
          $version = (Get-Content version.json -Raw | ConvertFrom-Json).version
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Install build tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build Windows setup exe
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          powershell -ExecutionPolicy Bypass -File .\packaging\windows\build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/windows/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Build checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.deb
            release-assets/*.exe
            release-assets/SHA256SUMS.txt
