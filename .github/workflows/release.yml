name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Deb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build .deb package
        run: |
          chmod +x packaging/linux/build_deb.sh
          bash packaging/linux/build_deb.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/deb/*.deb
          if-no-files-found: error

  build-windows:
    name: Build Windows Setup
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        shell: powershell
        run: |
          $version = (Get-Content version.json -Raw | ConvertFrom-Json).version
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-cairo
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-pyinstaller

      - name: Build Windows app with PyInstaller
        shell: msys2 {0}
        run: |
          set -euo pipefail
          python -V
          pyinstaller --noconfirm --clean --windowed --name JarvisBuchhaltung --icon "assets/icons/jarvis-buchhaltung.ico" --add-data "version.json;." app.py
          bash packaging/windows/prepare_msys2_runtime.sh

      - name: Build Windows setup exe
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe wurde nicht gefunden."
          }
          & $iscc "/DMyAppVersion=$env:APP_VERSION" "packaging\windows\jarvis-buchhaltung.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/windows/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - build-windows
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*"
          merge-multiple: true

      - name: Build checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.deb
            release-assets/*.exe
            release-assets/SHA256SUMS.txt
